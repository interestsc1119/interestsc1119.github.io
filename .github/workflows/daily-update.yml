name: Daily AI & News Update

on:
  schedule:
    # 每天北京时间 13:00 (UTC 5:00) 运行
    - cron: '0 5 * * *'
  workflow_dispatch:  # 手动触发

jobs:
  update-trending:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Fetch GitHub Trending & News
        id: fetch
        run: python scripts/fetch_trending.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update index.html with new data
        run: python scripts/update_html.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📊 Daily Update - $(date +'%Y-%m-%d')"
          file_pattern: 'data/*.json index.html'
