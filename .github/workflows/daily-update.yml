name: Daily AI & News Update

on:
  schedule:
    # Runs every day at 08:57 Beijing time (00:57 UTC).
    - cron: '57 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-trending:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Set today's date
        id: date
        run: echo "TODAY=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Fetch GitHub Trending & News
        id: fetch
        run: python scripts/fetch_trending.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update index.html with new data
        run: python scripts/update_html.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Daily Update - ${{ steps.date.outputs.TODAY }}"
          file_pattern: 'data/*.json index.html'
