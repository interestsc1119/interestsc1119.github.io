<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日精选 | Daily Digest</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #21262d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --border: #30363d;
            --star-color: #f0c14b;
            --success: #3fb950;
            --warning: #d29922;
            --ai-color: #a371f7;
            --news-color: #f78166;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        header {
            text-align: center;
            padding: 2rem 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2rem;
        }
        
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--accent) 0%, var(--ai-color) 50%, var(--news-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
        }
        
        /* 标签页导航 */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .tab-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.75rem 2rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .tab-btn:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }
        
        .tab-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        
        .tab-btn .icon {
            font-size: 1.2rem;
        }
        
        /* 更新信息 */
        .update-info {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .info-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem 1.5rem;
            text-align: center;
            min-width: 140px;
        }
        
        .info-card .value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
        }
        
        .info-card .label {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        
        /* 内容区域 */
        .content-section {
            display: none;
        }
        
        .content-section.active {
            display: block;
        }
        
        /* 趋势图 */
        .chart-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .chart-title {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }
        
        .chart-container {
            height: 160px;
            display: flex;
            align-items: flex-end;
            gap: 4px;
            padding: 1rem 0 2rem 0;
        }
        
        .chart-bar {
            flex: 1;
            background: linear-gradient(180deg, var(--accent) 0%, #1f6feb 100%);
            border-radius: 4px 4px 0 0;
            min-height: 8px;
            transition: transform 0.2s;
            position: relative;
            cursor: pointer;
        }
        
        .chart-bar:hover {
            transform: scaleY(1.05);
        }
        
        .chart-bar::after {
            content: attr(data-date);
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.65rem;
            color: var(--text-secondary);
            white-space: nowrap;
        }
        
        .chart-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        
        /* 项目网格 */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
        }
        
        .filter-tabs {
            display: flex;
            gap: 0.5rem;
        }
        
        .filter-tab {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }
        
        .filter-tab:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }
        
        .filter-tab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1rem;
        }
        
        .project-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.25rem;
            transition: all 0.2s;
        }
        
        .project-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }
        
        .project-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }
        
        .project-rank {
            background: var(--accent);
            color: #fff;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 600;
            flex-shrink: 0;
        }
        
        .project-name {
            font-size: 1rem;
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .project-name a {
            color: var(--accent);
            text-decoration: none;
        }
        
        .project-name a:hover {
            text-decoration: underline;
        }
        
        .project-desc {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .project-stats {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.85rem;
            flex-wrap: wrap;
        }
        
        .stat {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            color: var(--text-secondary);
        }
        
        .star-icon {
            fill: var(--star-color);
        }
        
        .stat.today {
            color: var(--success);
            font-weight: 500;
        }
        
        .view-btn {
            margin-left: auto;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.35rem 0.7rem;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        
        .view-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        
        /* 新闻列表 */
        .news-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .news-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem 1.25rem;
            transition: all 0.2s;
            display: flex;
            align-items: flex-start;
            gap: 1rem;
        }
        
        .news-item:hover {
            border-color: var(--news-color);
            transform: translateX(4px);
        }
        
        .news-rank {
            background: var(--news-color);
            color: #fff;
            min-width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 600;
            flex-shrink: 0;
        }
        
        .news-rank.top {
            background: linear-gradient(135deg, #ff6b6b 0%, #f0c14b 100%);
        }
        
        .news-content {
            flex: 1;
            min-width: 0;
        }
        
        .news-title {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 0.4rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .news-title a {
            color: var(--text-primary);
            text-decoration: none;
        }
        
        .news-title a:hover {
            color: var(--accent);
        }
        
        .news-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        
        .news-source {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        
        .news-hot {
            background: linear-gradient(135deg, #ff6b6b 0%, #f0c14b 100%);
            color: #000;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        
        /* 历史记录 */
        .history-section {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }
        
        .history-title {
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }
        
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
        }
        
        .history-item .date {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .history-item .count {
            font-size: 0.85rem;
        }
        
        .history-item .count .ai-count {
            color: var(--ai-color);
            font-weight: 600;
        }
        
        .history-item .count .news-count {
            color: var(--news-color);
            font-weight: 600;
        }
        
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 3rem;
        }
        
        footer a {
            color: var(--accent);
            text-decoration: none;
        }
        
        footer a:hover {
            text-decoration: underline;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            h1 {
                font-size: 1.6rem;
            }
            
            .tabs {
                flex-direction: column;
            }
            
            .projects-grid {
                grid-template-columns: 1fr;
            }
            
            .update-info {
                gap: 1rem;
            }
            
            .info-card {
                min-width: 120px;
            }
            
            .info-card .value {
                font-size: 1.5rem;
            }
            
            .news-item {
                flex-direction: column;
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 每日精选</h1>
            <p class="subtitle">AI 热门项目 · 科技热点资讯 · 每日自动更新</p>
        </header>
        
        <!-- 标签页导航 -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('ai')">
                <span class="icon">🤖</span>
                <span>AI 项目</span>
            </button>
            <button class="tab-btn" onclick="switchTab('news')">
                <span class="icon">📰</span>
                <span>科技新闻</span>
            </button>
        </div>
        
        <!-- 更新信息 -->
        <div class="update-info">
            <div class="info-card">
                <div class="value">{{AI_COUNT}}</div>
                <div class="label">AI 项目</div>
            </div>
            <div class="info-card">
                <div class="value">{{NEWS_COUNT}}</div>
                <div class="label">科技新闻</div>
            </div>
            <div class="info-card">
                <div class="value">{{UPDATE_DATE}}</div>
                <div class="label">更新日期</div>
            </div>
        </div>
        
        <!-- AI 项目区域 -->
        <section class="content-section active" id="ai-section">
            <div class="chart-section">
                <h2 class="chart-title">📈 AI 项目趋势（近 14 天）</h2>
                <div class="chart-container" id="ai-chart"></div>
                <div class="chart-labels">
                    <span>较早</span>
                    <span>较近</span>
                </div>
            </div>
            
            <div class="section-header">
                <h3 class="section-title">🔥 热门 AI 项目</h3>
                <div class="filter-tabs">
                    <button class="filter-tab active" onclick="filterAIProjects('all')">全部</button>
                    <button class="filter-tab" onclick="filterAIProjects('today')">今日飙升</button>
                </div>
            </div>
            
            <div class="projects-grid" id="ai-projects-grid">
                {{AI_PROJECTS_HTML}}
            </div>
        </section>
        
        <!-- 科技新闻区域 -->
        <section class="content-section" id="news-section">
            <div class="chart-section">
                <h2 class="chart-title">📈 科技新闻趋势（近 14 天）</h2>
                <div class="chart-container" id="news-chart"></div>
                <div class="chart-labels">
                    <span>较早</span>
                    <span>较近</span>
                </div>
            </div>
            
            <div class="section-header">
                <h3 class="section-title">🔥 科技热点</h3>
                <div class="filter-tabs">
                    <button class="filter-tab active" onclick="filterNews('all')">全部</button>
                    <button class="filter-tab" onclick="filterNews('hot')">热门</button>
                </div>
            </div>
            
            <div class="news-list" id="news-list">
                {{NEWS_HTML}}
            </div>
        </section>
        
        <!-- 历史记录 -->
        <section class="history-section">
            <h3 class="history-title">📅 历史记录</h3>
            <div class="history-list" id="history-list"></div>
        </section>
        
        <footer>
            <p>由 GitHub Actions 自动更新 · <a href="https://github.com/interestsc1119/interestsc1119.github.io" target="_blank">查看源码</a></p>
        </footer>
    </div>
    
    <script>
        // 切换标签页
        function switchTab(tab) {
            // 更新标签按钮状态
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.tab-btn').classList.add('active');
            
            // 更新内容区域
            document.querySelectorAll('.content-section').forEach(section => section.classList.remove('active'));
            
            if (tab === 'ai') {
                document.getElementById('ai-section').classList.add('active');
            } else {
                document.getElementById('news-section').classList.add('active');
            }
        }
        
        // 渲染 AI 趋势图
        function renderAIChart() {
            const chartData = {{AI_HISTORY_DATA}};
            const chartContainer = document.getElementById('ai-chart');
            const maxVal = Math.max(...chartData.values, 1);
            
            chartData.labels.forEach((label, i) => {
                const bar = document.createElement('div');
                bar.className = 'chart-bar';
                bar.style.background = 'linear-gradient(180deg, #a371f7 0%, #8957e5 100%)';
                const height = (chartData.values[i] / maxVal) * 100;
                bar.style.height = Math.max(height, 5) + '%';
                bar.setAttribute('data-date', label);
                bar.setAttribute('title', label + ': ' + chartData.values[i] + ' 个项目');
                chartContainer.appendChild(bar);
            });
        }
        
        // 渲染新闻趋势图
        function renderNewsChart() {
            const chartData = {{NEWS_HISTORY_DATA}};
            const chartContainer = document.getElementById('news-chart');
            const maxVal = Math.max(...chartData.values, 1);
            
            chartData.labels.forEach((label, i) => {
                const bar = document.createElement('div');
                bar.className = 'chart-bar';
                bar.style.background = 'linear-gradient(180deg, #f78166 0%, #e06040 100%)';
                const height = (chartData.values[i] / maxVal) * 100;
                bar.style.height = Math.max(height, 5) + '%';
                bar.setAttribute('data-date', label);
                bar.setAttribute('title', label + ': ' + chartData.values[i] + ' 条新闻');
                chartContainer.appendChild(bar);
            });
        }
        
        // 渲染历史记录
        function renderHistory() {
            const historyList = document.getElementById('history-list');
            const recentHistory = {{RECENT_HISTORY}};
            recentHistory.slice(-7).reverse().forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <span class="date">${item.date}</span>
                    <span class="count">
                        <span class="ai-count">AI ${item.ai_count}</span> · 
                        <span class="news-count">新闻 ${item.news_count}</span>
                    </span>
                `;
                historyList.appendChild(div);
            });
        }
        
        // 筛选 AI 项目
        function filterAIProjects(type) {
            const tabs = document.querySelectorAll('#ai-section .filter-tab');
            tabs.forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            const cards = document.querySelectorAll('#ai-projects-grid .project-card');
            cards.forEach(card => {
                if (type === 'all') {
                    card.style.display = 'block';
                } else if (type === 'today') {
                    const hasToday = card.querySelector('.stat.today');
                    card.style.display = hasToday ? 'block' : 'none';
                }
            });
        }
        
        // 筛选新闻
        function filterNews(type) {
            const tabs = document.querySelectorAll('#news-section .filter-tab');
            tabs.forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            const items = document.querySelectorAll('#news-list .news-item');
            items.forEach(item => {
                if (type === 'all') {
                    item.style.display = 'flex';
                } else if (type === 'hot') {
                    const hasHot = item.querySelector('.news-hot');
                    item.style.display = hasHot ? 'flex' : 'none';
                }
            });
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderAIChart();
            renderNewsChart();
            renderHistory();
        });
    </script>
</body>
</html>
