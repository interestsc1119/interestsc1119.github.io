<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 热门项目日报 | Daily AI Trending</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #21262d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --border: #30363d;
            --star-color: #f0c14b;
            --success: #3fb950;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        header {
            text-align: center;
            padding: 3rem 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2rem;
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--accent) 0%, #a371f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }
        
        .update-info {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }
        
        .info-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem 1.5rem;
            text-align: center;
        }
        
        .info-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }
        
        .info-card .label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .chart-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .chart-title {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }
        
        .chart-container {
            height: 200px;
            display: flex;
            align-items: flex-end;
            gap: 4px;
            padding: 1rem 0;
        }
        
        .chart-bar {
            flex: 1;
            background: linear-gradient(180deg, var(--accent) 0%, #1f6feb 100%);
            border-radius: 4px 4px 0 0;
            min-height: 10px;
            transition: transform 0.2s, background 0.2s;
            position: relative;
            cursor: pointer;
        }
        
        .chart-bar:hover {
            background: linear-gradient(180deg, var(--accent-hover) 0%, var(--accent) 100%);
            transform: scaleY(1.05);
        }
        
        .chart-bar::after {
            content: attr(data-date);
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: var(--text-secondary);
            white-space: nowrap;
        }
        
        .chart-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        
        .projects-section {
            margin-top: 2rem;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .filter-tabs {
            display: flex;
            gap: 0.5rem;
        }
        
        .filter-tab {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        
        .filter-tab:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }
        
        .filter-tab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1rem;
        }
        
        .project-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.25rem;
            transition: all 0.2s;
        }
        
        .project-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }
        
        .project-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }
        
        .project-rank {
            background: var(--accent);
            color: #fff;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 600;
            flex-shrink: 0;
        }
        
        .project-name {
            font-size: 1.1rem;
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .project-name a {
            color: var(--accent);
            text-decoration: none;
        }
        
        .project-name a:hover {
            text-decoration: underline;
        }
        
        .project-desc {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .project-stats {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.9rem;
            flex-wrap: wrap;
        }
        
        .stat {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            color: var(--text-secondary);
        }
        
        .star-icon {
            fill: var(--star-color);
        }
        
        .stat.today {
            color: var(--success);
            font-weight: 500;
        }
        
        .view-btn {
            margin-left: auto;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        
        .view-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        
        .history-section {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }
        
        .history-title {
            font-size: 1.3rem;
            margin-bottom: 1rem;
        }
        
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
        }
        
        .history-item .date {
            color: var(--text-secondary);
        }
        
        .history-item .count {
            color: var(--accent);
            font-weight: 600;
        }
        
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 3rem;
        }
        
        footer a {
            color: var(--accent);
            text-decoration: none;
        }
        
        footer a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .projects-grid {
                grid-template-columns: 1fr;
            }
            
            .update-info {
                gap: 1rem;
            }
            
            .chart-bar::after {
                font-size: 0.6rem;
                bottom: -20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 AI 热门项目日报</h1>
            <p class="subtitle">每日更新 · GitHub Trending AI & ML 项目精选</p>
            <div class="update-info">
                <div class="info-card">
                    <div class="value">{{PROJECT_COUNT}}</div>
                    <div class="label">今日 AI 项目</div>
                </div>
                <div class="info-card">
                    <div class="value">{{UPDATE_DATE}}</div>
                    <div class="label">更新日期</div>
                </div>
            </div>
        </header>
        
        <div class="chart-section">
            <h2 class="chart-title">📈 近 14 天趋势</h2>
            <div class="chart-container" id="chart"></div>
            <div class="chart-labels">
                <span>较早</span>
                <span>较近</span>
            </div>
        </div>
        
        <section class="projects-section">
            <div class="section-header">
                <h2 class="section-title">🔥 热门项目</h2>
                <div class="filter-tabs">
                    <button class="filter-tab active" onclick="filterProjects('all')">全部</button>
                    <button class="filter-tab" onclick="filterProjects('today')">今日飙升</button>
                </div>
            </div>
            <div class="projects-grid" id="projects-grid">
                {{PROJECTS_HTML}}
            </div>
        </section>
        
        <section class="history-section">
            <h2 class="history-title">📅 历史记录</h2>
            <div class="history-list" id="history-list"></div>
        </section>
        
        <footer>
            <p>由 GitHub Actions 自动更新 · <a href="https://github.com/interestsc1119/interestsc1119.github.io" target="_blank">查看源码</a></p>
        </footer>
    </div>
    
    <script>
        // 历史数据
        const recentDates = {{RECENT_DATES}};
        
        // 渲染趋势图
        function renderChart() {
            const chartData = {{HISTORY_DATA}};
            const chartContainer = document.getElementById('chart');
            const maxVal = Math.max(...chartData.values, 1);
            
            chartData.labels.forEach((label, i) => {
                const bar = document.createElement('div');
                bar.className = 'chart-bar';
                const height = (chartData.values[i] / maxVal) * 100;
                bar.style.height = Math.max(height, 5) + '%';
                bar.setAttribute('data-date', label);
                bar.setAttribute('title', `${label}: ${chartData.values[i]} 个项目`);
                chartContainer.appendChild(bar);
            });
        }
        
        // 渲染历史记录
        function renderHistory() {
            const historyList = document.getElementById('history-list');
            recentDates.slice(-7).reverse().forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <span class="date">${item.date}</span>
                    <span class="count">${item.count} 个项目</span>
                `;
                historyList.appendChild(div);
            });
        }
        
        // 筛选项目
        function filterProjects(type) {
            const tabs = document.querySelectorAll('.filter-tab');
            tabs.forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            const cards = document.querySelectorAll('.project-card');
            cards.forEach(card => {
                if (type === 'all') {
                    card.style.display = 'block';
                } else if (type === 'today') {
                    const hasToday = card.querySelector('.stat.today');
                    card.style.display = hasToday ? 'block' : 'none';
                }
            });
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderChart();
            renderHistory();
        });
    </script>
</body>
</html>
